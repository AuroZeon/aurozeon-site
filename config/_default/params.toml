# AuroWeaver app URL - local default, update for production deployment
[auroweaver]
app_url = "http://ec2-52-91-79-13.compute-1.amazonaws.com:8806/AuroWeaver/web/auroweaver"
# Hero uses Font Awesome; no separate image file required
auroweaver_logo = ""

# SHOULEMA app store URLs - update when app is published
[shoulema]
app_store_url = "https://play.google.com/store/apps/details?id=com.shou.calorie"
ios_store_url = "https://apps.apple.com/us/app/shoulema-calorie-scanner/id6760223102"

# XinBridge 心桥 - AI emotional companionship for cancer patients (cloud-based Gentle Companion; see site privacy policy)
# app_store_url = Google Play (same key naming as [shoulema])
[xinbridge]
app_store_url = "https://play.google.com/store/apps/details?id=com.xinbridge.app"
ios_store_url = "https://apps.apple.com/us/app/xinbridge-cancer-care-calm/id6760957468"

# Wildfire Assistant: NYU Capstone wildfire risk & preparedness app
# app_store_url = Google Play (same key naming as [shoulema])
[wildfire_assistant]
app_store_url = "https://play.google.com/store/apps/details?id=com.nyu.wildfire.assistant"
ios_store_url = "https://apps.apple.com/us/app/wildfire-assistant/id6761288843"

#################### default parameters ################################
# Site logo (served from static/images/) - used in header
site_logo = "images/aurozeon.logo.svg"
# favicon module: https://github.com/gethugothemes/hugo-modules/tree/master/images#favicon-implementation
favicon = "images/favicon.png"
# logo module: https://github.com/gethugothemes/hugo-modules/tree/master/images#logo-implementation
logo = "images/banner.png"
logo_darkmode = "images/logo-darkmode.png"
# use `px` or `x` with logo_width, example: "100px".
# Note: logo_width is not work with .svg file
logo_width = "220px"
logo_height = "55px"
# if logo_webp set false, will not generate WEBP version of logo | default is true
logo_webp = true
# logo text will only show when logo is missing.
logo_text = "AuroZeon"
# navbar fixed to top
navbar_fixed = true
# theme-mode
theme_switcher = false
theme_default = "system" # available options [light/dark/system]
# Main Sections
mainSections = ["blog"]
# contact form action
contact_form_action = "#" # contact form works with [https://airform.io/] or [https://formspree.io]
# Google Analytics 4 - set in hugo.toml [params] for site-wide tracking

# google tag manager, see https://developers.google.com/tag-manager/
google_tag_manager = "" # example: GTM-XXXXXXXX
google_adsense = ""     # example: ca-pub-xxxxxxxxxxxxxxxx
# custom script on header, example: custom_script= "<script>console.log(\"Hello World\")</script>"
custom_script = ""
# copyright
copyright = "AuroZeon is based and driven by the open source community."

# Preloader
# preloader module: https://github.com/gethugothemes/hugo-modules/tree/master/components/preloader
[preloader]
enable = false
preloader = "" # use jpg, png, svg or gif format.

# Navigation button
[navigation_button]
enable = true
label = "Give us a ⭐️"
link = "https://github.com/ESIPFed/Geoweaver"

# search
# search module: https://github.com/gethugothemes/hugo-modules/tree/master/search
[search]
enable = true
primary_color = "#121212"
include_sections = ["blog"]
show_image = true
show_description = true
show_tags = true
show_categories = true


# seo meta data for OpenGraph / Twitter Card
# seo module: https://github.com/gethugothemes/hugo-modules/tree/master/seo-tools/basic-seo
[metadata]
keywords = ["Geoweaver", "Pygeoweaver"]
description = "A web system to allow users to automatically record history and manage complicated scientific workflows in web browsers involving the online spatial data facilities, high-performance computation platforms, and open-source libraries."
author = "zsun@gmu.edu"
image = "images/og-image.png"


# site verifications
# verification module: https://github.com/gethugothemes/hugo-modules/tree/master/seo-tools/site-verifications
[site_verification]
google = ""   # Your verification code
bing = ""     # Your verification code
baidu = ""    # Your verification code
facebook = "" # Your verification code
mastodon = "" # Your verification code

# cookies
# cookies module: https://github.com/gethugothemes/hugo-modules/tree/master/components/cookie-consent
[cookies]
enable = false
expire_days = 60
content = "This site uses cookies. By continuing to use this website, you agree to their use."
button = "I Accept"

######################## sidebar widgets #########################
[widgets]
sidebar = ["categories", "tags"]


# google map
[google_map]
enable = false
map_api_key = "AIzaSyCcABaamniA6OL5YvYSpB3pFMNrXwXnLwU"
map_latitude = "51.5223477"
map_longitude = "-0.1622023"
map_marker = "images/marker.png"


# Subscription
[subscription]
enable = false
# mailchimp subsciption
mailchimp_form_action = "https://gmail.us4.list-manage.com/subscribe/post?u=463ee871f45d2d93748e77cad&amp;id=a0a2c6d074" # replace this url with yours
mailchimp_form_name = "b_463ee871f45d2d93748e77cad_a0a2c6d074"
